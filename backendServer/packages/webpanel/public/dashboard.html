<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Clients Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: #252526;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #858585;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ec9b0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .auth-section {
            background: #252526;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: none;
        }

        .auth-section.show {
            display: block;
        }

        .auth-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="password"] {
            flex: 1;
            padding: 10px 15px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 14px;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #007acc;
        }

        button {
            padding: 10px 20px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #005a9e;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .error-message {
            color: #f48771;
            margin-top: 10px;
            font-size: 13px;
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .client-card {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s;
        }

        .client-card:hover {
            border-color: #007acc;
            box-shadow: 0 4px 12px rgba(0, 122, 204, 0.2);
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .client-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .client-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .client-status.online {
            background: rgba(78, 201, 176, 0.2);
            color: #4ec9b0;
        }

        .client-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid #3c3c3c;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #858585;
        }

        .info-value {
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
        }

        .client-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .shell-select {
            width: 100%;
            padding: 8px 12px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 13px;
            cursor: pointer;
        }

        .shell-select:focus {
            outline: none;
            border-color: #007acc;
        }

        .btn-terminal {
            width: 100%;
            padding: 10px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-terminal:hover {
            background: #1177bb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #858585;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #858585;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #3c3c3c;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ Remote Clients Dashboard</h1>
            <div class="status">
                <div class="status-item">
                    <div class="status-indicator"></div>
                    <span>Connected to server</span>
                </div>
                <div class="status-item">
                    <span id="client-count">Loading...</span>
                </div>
            </div>
        </header>

        <!-- Authentication section -->
        <div class="auth-section" id="auth-section">
            <h3 style="margin-bottom: 15px;">🔐 Authentication Required</h3>
            <div class="auth-input-group">
                <input 
                    type="password" 
                    id="auth-token" 
                    placeholder="Enter access token..."
                    autocomplete="off"
                >
                <button id="auth-btn" onclick="authenticate()">Authenticate</button>
            </div>
            <div class="error-message" id="auth-error" style="display: none;"></div>
        </div>

        <!-- Clients grid -->
        <div id="clients-container">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Connecting...</p>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let authenticated = false;
        let authRequired = false;

        // Connect to WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Connected to server');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                setTimeout(connect, 3000); // Reconnect after 3s
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Handle incoming messages
        function handleMessage(data) {
            switch (data.type) {
                case 'welcome':
                    authRequired = data.authRequired;
                    if (authRequired) {
                        document.getElementById('auth-section').classList.add('show');
                        // Try to auth with stored token
                        const storedToken = localStorage.getItem('auth-token');
                        if (storedToken) {
                            sendAuth(storedToken);
                        }
                    } else {
                        authenticated = true;
                        requestClientList();
                    }
                    break;

                case 'auth':
                    if (data.success) {
                        authenticated = true;
                        document.getElementById('auth-section').classList.remove('show');
                        document.getElementById('auth-error').style.display = 'none';
                        requestClientList();
                    } else {
                        document.getElementById('auth-error').textContent = 
                            data.error || 'Authentication failed';
                        document.getElementById('auth-error').style.display = 'block';
                    }
                    break;

                case 'client:list':
                    renderClients(data.clients);
                    break;

                case 'error':
                    console.error('Server error:', data.error);
                    if (data.error.includes('Not authenticated')) {
                        document.getElementById('auth-section').classList.add('show');
                    }
                    break;
            }
        }

        // Send authentication
        function sendAuth(token) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'auth',
                    token: token
                }));
            }
        }

        // Authenticate button handler
        function authenticate() {
            const token = document.getElementById('auth-token').value.trim();
            if (!token) {
                document.getElementById('auth-error').textContent = 'Please enter a token';
                document.getElementById('auth-error').style.display = 'block';
                return;
            }

            localStorage.setItem('auth-token', token);
            sendAuth(token);
        }

        // Request client list
        function requestClientList() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'client:list'
                }));
            }
        }

        // Render clients
        function renderClients(clients) {
            const container = document.getElementById('clients-container');
            const countEl = document.getElementById('client-count');

            countEl.textContent = `${clients.length} client${clients.length !== 1 ? 's' : ''} connected`;

            if (clients.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔌</div>
                        <h3>No clients connected</h3>
                        <p style="margin-top: 10px;">Waiting for remote clients to connect...</p>
                    </div>
                `;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'clients-grid';

            clients.forEach(client => {
                const card = createClientCard(client);
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        // Create client card
        function createClientCard(client) {
            const card = document.createElement('div');
            card.className = 'client-card';

            const connectedAt = new Date(client.connectedAt).toLocaleString();
            const lastPing = client.lastPing 
                ? new Date(client.lastPing).toLocaleString() 
                : 'N/A';

            card.innerHTML = `
                <div class="client-header">
                    <div class="client-name">${client.name || client.clientId}</div>
                    <div class="client-status online">● ONLINE</div>
                </div>
                <div class="client-info">
                    <div class="info-row">
                        <span class="info-label">Client ID:</span>
                        <span class="info-value">${client.clientId}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">OS:</span>
                        <span class="info-value">${client.os || 'Unknown'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Arch:</span>
                        <span class="info-value">${client.arch || 'Unknown'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Connected:</span>
                        <span class="info-value">${connectedAt}</span>
                    </div>
                </div>
                <div class="client-actions">
                    <select class="shell-select" id="shell-${client.clientId}">
                        <option value="">Default Shell</option>
                        <option value="cmd.exe">CMD (cmd.exe)</option>
                        <option value="powershell.exe">PowerShell</option>
                        <option value="pwsh.exe">PowerShell Core</option>
                        <option value="C:\\Program Files\\Git\\usr\\bin\\bash.exe">Git Bash</option>
                    </select>
                    <button class="btn-terminal" onclick="openTerminal('${client.clientId}')">
                        📟 Open Terminal
                    </button>
                    <button class="btn-terminal" onclick="openFileManager('${client.clientId}')">
                        📁 File Manager
                    </button>
                </div>
            `;

            return card;
        }

        // Open terminal for client
        function openTerminal(clientId) {
            const shellSelect = document.getElementById(`shell-${clientId}`);
            const shell = shellSelect ? shellSelect.value : '';
            const url = shell ? `/terminal/${clientId}?shell=${encodeURIComponent(shell)}` : `/terminal/${clientId}`;
            window.open(url, '_blank');
        }

        // Open file manager for client
        function openFileManager(clientId) {
            window.open(`/files/${clientId}`, '_blank');
        }

        // Auto-refresh client list
        setInterval(() => {
            if (authenticated) {
                requestClientList();
            }
        }, 5000);

        // Start connection
        connect();

        // Auth on Enter key
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-token')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    authenticate();
                }
            });
        });
    </script>
</body>
</html>
